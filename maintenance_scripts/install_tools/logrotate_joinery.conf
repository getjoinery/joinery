# Joinery log rotation configuration
# Installed by _site_init.sh — rotates Apache error logs weekly
# The {{SITE_ROOT}} placeholder is replaced during installation

{{SITE_ROOT}}/logs/error.log {
    su www-data user1
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 100M
}

{{SITE_ROOT}}/logs/cron_scheduled_tasks.log {
    su www-data user1
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 10M
}
