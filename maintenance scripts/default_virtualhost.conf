<VirtualHost placeholderip:80>
        ServerName placeholdersite
        DirectoryIndex index.php index.html
        DocumentRoot /var/www/html/placeholder/public_html
        ErrorLog /var/www/html/placeholder/logs/error.log
        CustomLog /var/www/html/placeholder/logs/access.log combined
</VirtualHost>

